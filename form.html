<!DOCTYPE html>
<head>
    <title>Form</title>
</head>
<body>
    <form action="" method="post">
        <table>
            <h3>&emsp;&emsp;&emsp;&emsp;&emsp;Form Biodata</h3>
            <tr>
                <td>NIM </td>
                <td>:&emsp;<input type="text" id="nim" style="width: 120px;"></td>
            </tr>
            <tr>
                <td>Nama</td>
                <td>:&emsp;<input type="text" id="nama"></td>
            </tr>
            <tr>
                <td>Jenis Kelamin</td>
                <td>:&emsp;
                    <input type="radio" name="jk" value="l"> Pria
                    <input type="radio" name="jk" value="p"> Wanita
                </td>
            </tr>
            <tr>
                <td>Jurusan</td>
                <td>:&emsp;
                    <select>
                        <option value="">Pilih Jurusan</option>
                        <option value="D3SI">D3 SI</option>
                        <option value="S1RPL">S1 RPL</option>
                        <option value="S1MANAJEMEN">S1 MANAJEMEN</option>
                        <option value="S1AKUNTANSI">S1 AKUNTANSI</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Hobby</td>
                <td>:&emsp;
                    <input type="checkbox" name="cekhobby[]" value="komputer"> Komputer
                    <input type="checkbox" name="cekhobby[]" value="musik"> Musik
                    <input type="checkbox" name="cekhobby[]" value="olahraga"> Olahraga
                    <input type="checkbox" name="cekhobby[]" value="travelling"> Travelling
                </td>
            </tr>
            <tr>
                <td>Catatan</td>
                <td>:&emsp;
                    <textarea required name="catatan" id="catatan" cols="50" rows="5"></textarea>
                </td>
            </tr>
            <tr>
                <td>Foto</td>
                <td>:&emsp;
                    <input type="file" name="foto" accept="image/*">
                </td>
            </tr>
            <tr>
                <td>E-Mail</td>
                <td>:&emsp;
                    <input Required type="email" name ="email" id="email">
                </td>
            </tr>
            <tr>
                <td>Sandi Login</td>
                <td>:&emsp;
                    <input Required type="password" name ="sandi" id="sandi">
                </td>
            </tr>
            <tr>
                <td>Ulangi Sandi Login</td>
                <td>:&emsp;
                    <input Required type="password" name ="ulang" id="ulang">
                </td>
            </tr>
            <td></td>
            <tr><td></td>
                <td>&emsp;&nbsp;
                    <input type="submit" name="submit" value="Simpan">
                    <input type="reset" name="batal" value="Batal">
                    <button type="button" onclick="alert('Lengkapi data anda!')">Peringatan</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
